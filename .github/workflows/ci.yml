name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Validate committed ranking payload freshness
        run: python scripts/validate_rankings.py data/rankings.json --max-age-hours 48
      - name: Validate generated ranking payload can be built from cache or committed data
        run: python scripts/ingest_rankings.py --offline --output /tmp/rankings.json
      - name: Validate generated ranking payload schema
        run: python scripts/validate_rankings.py /tmp/rankings.json
